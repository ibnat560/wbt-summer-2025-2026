<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Form</title>
  </head>
  <body>
    <h1>Student Registration Form</h1>
    <form action="#" method="post">
      <fieldset>
        <legend>Personal Information</legend>
        <label for="fname">First Name</label>
        <input
          type="text"
          name="fname"
          id="fname"
          placeholder="Enter your first name"
          required
        />
        <br /><br />

        <label for="st">Student ID</label>
        <input
          type="text"
          name="student_id"
          id="st"
          placeholder="Enter your student id"
          required
        />
        <br /><br />

        <!--Email-->

        <label for="email">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter your Email"
          required
        />

        <!-- Phone Number -->

        <label for="phone">Phone Number</label>
        <input
          type="tel"
          name="phone"
          id="phone"
          placeholder="Enter your Phone Number"
          required
        />
        <br />
        <br />

        <!-- DOB -->

        <label for="dob">Date Of Birth</label>
        <input type="date" name="dob" id="dob" required />

        <br /><br />

        <!-- Gender -->
        <input type="radio" name="gender" id="male" value="male" />
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female" value="female" />
        <label for="female">Female</label>

        <br /><br />
      </fieldset>
      </form>

      <br><br>


      <!-- Academic Information -->

      <!-- Department -->


<form action="#" method="post">
      <fieldset>
        <legend>Academic Information</legend>
        <label for="department">Department</label>
        <select id="department" name="department" >
        <option value="Choose Department" selected>Choose Department</option>
        <option value="CSE" >CSE</option>
        <option value="EEE" >EEE</option>
        <option value="BBA" >BBA</option>
        <option value="English" >English</option>
        <option value="Civil Engineering" >Civil Engineering</option>
        </select>
        <br> <br>

        <!-- Semester -->

        <label for="semester">Semester</label>
        <select id="semester" name="semester" >
        <option value="Choose Semester" selected>Choose Semester</option>
        <option value="1st Semester" >1st semester</option>
        <option value="2nd Semester" >2nd semester</option>
        <option value="3rd Semester" >3rd semester</option>
        <option value="4th Semester" >4th semester</option>
        <option value="5th Semester" >5th semester</option>
        <option value="6th Semester" >6th semester</option>
        <option value="7th Semester" >7th semester</option>
        <option value="8th Semester" >8th semester</option>
        
        </select>

         </fieldset>
         </form>
         <br><br>


         <!-- Skills -->

      


<form action="#" method="post">
      <fieldset>
        <legend>Skills</legend>
        <label for="skills">Skills</label>
        <select id="skills" name="skills" >
        <option value="Select Programming Languages Known" selected>Select Programming Languages Known</option>
        <option value="C" >C</option>
        <option value="C++" >C++</option>
        <option value="Java" >Java</option>
        <option value="Python" >Python</option>
        <option value="JavaScript" >Java Script</option>
        </select>
        <br> <br>

       
         </fieldset>
         <br><br>
         </form>


         <!-- Academic Information -->

      <!-- Additional Information -->


<form action="#" method="post">
      <fieldset>
        <legend>Additional Information</legend>
        <label for="address">Address</label><br>
        <textarea id="address" name="address" rows="5" cols="40"></textarea>
        <br><br>


        <label for="photo">Upload Student Photo</label><br>
        <input type="file" id="photo" name="photo" >
        <br><br>


        <label for="comments">Comments/Suggestions</label>
        <br>
        <textarea id="comments" name="comments" rows="5" cols="60" maxlength="200">textarea</textarea>
        <br><br>




        

        

         </fieldset>
         </form>
         <br> <br>



         <!-- Buttons -->


<form action="#" method="post">
     
        
        


        
        <input type="submit" id="submit" name="submit" >
        

         
        <input type="reset" id="reset" name="reset" >
        <br><br>

        </form>


        









      
    </form>
  </body>
</html>
