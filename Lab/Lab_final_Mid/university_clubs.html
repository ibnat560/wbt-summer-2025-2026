<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Club Membership Registration</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h2 id="heading">University Club Membership Registration Form</h2>

      <form id="myForm">
        <!-- First Name -->

        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="Enter your first name" />
        <small id="firstNameError" class="error"></small>

        <!-- Last Name -->

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Enter your last name" />
        <small id="lastNameError" class="error"></small>

        <!-- Email -->

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="example@gmail.com" />
        <small id="emailError" class="error"></small>

        <!-- Password -->

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" />
        <small id="passwordError" class="error"></small>

        <!-- Gender -->

        <label>Gender</label>

        <div class="radio-group">
          <input type="radio" id="male" name="gender" value="Male" />
          <label for="male">Male</label>

          <input type="radio" id="female" name="gender" value="Female" />
          <label for="female">Female</label>
        </div>

        <small id="genderError" class="error"></small>

        <!-- Interested Clubs -->

        <label>Interested Clubs</label>

        <div class="checkbox-group">
          <div>
            <input
              type="checkbox"
              id="programming"
              name="club"
              value="Programming Club"
            />
            <label for="programming">Programming Club</label>
          </div>

          <div>
            <input
              type="checkbox"
              id="robotics"
              name="club"
              value="Robotics Club"
            />
            <label for="robotics">Robotics Club</label>
          </div>

          <div>
            <input
              type="checkbox"
              id="debate"
              name="club"
              value="Debate Club"
            />
            <label for="debate">Debate Club</label>
          </div>

          <div>
            <input
              type="checkbox"
              id="photography"
              name="club"
              value="Photography Club"
            />
            <label for="photography">Photography Club</label>
          </div>
        </div>

        <small id="clubError" class="error"></small>

        <!-- Club Category -->

        <label for="category">Club Category</label>

        <select id="category">
          <option value="">Select Club Category</option>
          <option value="Academic">Academic</option>
          <option value="Technical">Technical</option>
          <option value="Cultural">Cultural</option>
          <option value="Sports">Sports</option>
        </select>

        <small id="categoryError" class="error"></small>

        <!-- Why Join -->

        <label for="reason">Why do you want to join?</label>

        <textarea
          id="reason"
          rows="5"
          placeholder="Write at least 20 characters..."
        ></textarea>

        <small id="reasonError" class="error"></small>

        <!-- Submit -->

        <button type="submit">Register</button>
      </form>
    </div>

    <script src="script1.js"></script>
  </body>
</html>
